<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>not yet — coming soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Apply theme before paint -->
  <script>
    (function () {
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <style>
    [data-theme="light"] {
      --bg:     #f7f6f2;
      --text:   #1a1917;
      --muted:  #6b6860;
      --accent: #2a52be;
      --border: #e2e0d8;
    }
    [data-theme="dark"] {
      --bg:     #111110;
      --text:   #e8e6df;
      --muted:  #8a8880;
      --accent: #6b8cff;
      --border: #2e2d2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .wrap { max-width: 480px; width: 100%; }

    .prompt {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2rem;
      letter-spacing: 0.06em;
    }
    .prompt::before { content: '$ '; color: var(--accent); }

    .heading {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 1rem;
    }
    .heading .hl { color: var(--accent); }

    .sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }
    .sub .blink {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: var(--accent);
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
      margin-left: 2px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .back-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 6px;
      transition: color 0.2s, border-color 0.2s;
    }
    .back-link:hover { color: var(--text); border-color: var(--muted); }
    .back-link::before { content: '←'; }

    .error-code {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      font-size: 11px;
      color: var(--border);
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="prompt">cat content.md</p>
    <h1 class="heading">this page is <span class="hl">not ready yet.</span></h1>
    <p class="sub">
      currently being written / uploaded / procrastinated on.<br>
      check back later<span class="blink"></span>
    </p>
    <hr class="divider" />
    <a class="back-link" href="index.html">go back home</a>
  </div>
  <span class="error-code">404 (well, not really)</span>
</body>
</html>
